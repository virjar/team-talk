# demo profile - official demo site (im.virjar.com)

# -- Build config --
serverUrl=https://im.virjar.com
tcpHost=im.virjar.com
tcpPort=5100
showAdvancedSettings=true
buildProfile=demo

# -- Deploy config (used by deployServer/uploadRelease tasks) --
deploy.host=im.virjar.com
deploy.user=root
deploy.path=/opt/teamtalk

# -- Server SSL --
server.ssl.enabled=true
server.ssl.port=443
