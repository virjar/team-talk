# production profile - template
# Copy to gradle/profiles/<your-name>.properties and modify

# -- Build config (required) --
serverUrl=https://your-server.com
tcpHost=your-server.com
tcpPort=5100
showAdvancedSettings=false
buildProfile=production

# -- Deploy config (optional) --
deploy.host=your-server.com
deploy.user=root
deploy.path=/opt/teamtalk

# -- Server SSL --
server.ssl.enabled=false
server.ssl.port=443
