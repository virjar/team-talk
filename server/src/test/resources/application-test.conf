ktor {
    deployment {
        port = 0
    }
    tcp {
        port = 0
    }
    application {
        modules = [ com.virjar.tk.ApplicationKt.module ]
    }
}

database {
    jdbcUrl = "jdbc:postgresql://127.0.0.1:5432/teamtalk_test"
    jdbcUrl = ${?TEST_DATABASE_JDBC_URL}
    user = "postgres"
    user = ${?TEST_DATABASE_USER}
    password = "postgres"
    password = ${?TEST_DATABASE_PASSWORD}
}

jwt {
    secret = "TestSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong"
}

rocksdb {
    path = "/tmp/teamtalk-http-test-rocksdb"
}

lucene {
    path = "/tmp/teamtalk-http-test-lucene"
}

file {
    max-size-bytes = 10485760
}
