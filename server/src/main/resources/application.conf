ktor {
    deployment {
        port = 8080
        port = ${?KTOR_PORT}
        sslPort = ${?KTOR_SSL_PORT}
        watch = []
    }
    security {
        ssl {
            keyStore = ${?SSL_KEYSTORE}
            keyStorePassword = ${?SSL_KEYSTORE_PASSWORD}
            privateKeyPassword = ${?SSL_PRIVATE_KEY_PASSWORD}
        }
    }
    tcp {
        port = 5100
        port = ${?TCP_PORT}
    }
    application {
        modules = [ com.virjar.tk.ApplicationKt.module ]
    }
}

database {
    jdbcUrl = "jdbc:postgresql://127.0.0.1:5432/teamtalk"
    user = "postgres"
    user = ${?DATABASE_USER}
    password = "postgres"
    password = ${?DATABASE_PASSWORD}
}

jwt {
    secret = "TeamTalk2026SecretKeyForJWTTokenGenerationMustBeAtLeast256Bits"
    secret = ${?JWT_SECRET}
}

storage {
    large-file-threshold = 33554432
    large-file-threshold = ${?STORAGE_LARGE_FILE_THRESHOLD}
    lifecycle {
        archive-age-days = 180
        delete-after-archive-days = 30
        maintenance-hour = 3
    }
}

file {
    max-size-bytes = 52428800
    max-size-bytes = ${?FILE_MAX_SIZE_BYTES}
}
