services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamtalk"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: teamtalk
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teamtalk
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
