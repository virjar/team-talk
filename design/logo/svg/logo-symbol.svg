<?xml version="1.0" encoding="UTF-8"?>
<!--
  TeamTalk 品牌 Logo · 彩色图形版（无背景）
  用途：浅色背景上的嵌入式 logo（如关于页、文档、水印）。
  透明背景，节点用品牌蓝，中央焦点保留品牌蓝小圆。
  规格：1024x1024。
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="ttSym" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3370FF"/>
      <stop offset="1" stop-color="#245BDB"/>
    </linearGradient>
  </defs>
  <g stroke="url(#ttSym)" stroke-width="22" stroke-linecap="round" fill="none">
    <line x1="316" y1="372" x2="708" y2="372"/>
    <line x1="512" y1="372" x2="512" y2="708"/>
  </g>
  <g fill="url(#ttSym)">
    <circle cx="316" cy="372" r="58"/>
    <circle cx="708" cy="372" r="58"/>
    <circle cx="512" cy="708" r="58"/>
    <circle cx="512" cy="372" r="76"/>
  </g>
</svg>
