name: Build & Release

on:
  workflow_dispatch:
    inputs:
      build_profile:
        description: 'Profile name (e.g. demo, production, mycompany)'
        required: true
        default: 'demo'
      profile_json:
        description: 'External profile JSON. Leave empty to read from PROFILE_JSON secret (recommended for private deployments).'
        required: false
        default: ''

env:
  BUILD_PROFILE: ${{ github.event.inputs.build_profile }}

jobs:
  # ── Server distribution ─────────────────────────────
  server:
    name: Server Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject external profile (if provided)
        if: ${{ github.event.inputs.profile_json != '' || vars.PROFILE_JSON != '' }}
        run: |
          mkdir -p gradle/profiles
          PROFILE_JSON='${{ github.event.inputs.profile_json }}'
          if [ -z "$PROFILE_JSON" ]; then
            PROFILE_JSON='${{ vars.PROFILE_JSON }}'
          fi
          echo "$PROFILE_JSON" > gradle/profiles/external.json
          cat gradle/profiles/external.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build server distribution
        run: ./gradlew :server:installDist --quiet

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-server
          path: server/build/install/server/
          retention-days: 7

  # ── Desktop Linux (deb) ─────────────────────────────
  desktop-linux:
    name: Desktop (Linux deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject external profile
        shell: bash
        run: |
          P='${{ github.event.inputs.profile_json }}'
          [ -z "$P" ] && P='${{ secrets.PROFILE_JSON }}'
          if [ -n "$P" ]; then
            mkdir -p gradle/profiles
            echo "$P" > gradle/profiles/external.json
            echo "External profile injected"
          else
            echo "No external profile (using built-in)"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop package
        run: ./gradlew :desktop:packageReleaseDistributionForCurrentOS -Pprofile=${{ env.BUILD_PROFILE }} --quiet

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-desktop-linux
          path: desktop/build/compose/binaries/main-release/deb/*.deb
          retention-days: 7

  # ── Desktop Windows (msi) ───────────────────────────
  desktop-windows:
    name: Desktop (Windows msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject external profile
        shell: bash
        run: |
          P='${{ github.event.inputs.profile_json }}'
          [ -z "$P" ] && P='${{ secrets.PROFILE_JSON }}'
          if [ -n "$P" ]; then
            mkdir -p gradle/profiles
            echo "$P" > gradle/profiles/external.json
            echo "External profile injected"
          else
            echo "No external profile (using built-in)"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop package
        run: .\gradlew.bat :desktop:packageReleaseDistributionForCurrentOS -Pprofile=${{ env.BUILD_PROFILE }} --quiet

      - name: Upload msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-desktop-windows
          path: desktop/build/compose/binaries/main-release/msi/*.msi
          retention-days: 7

  # ── Desktop macOS (dmg) ────────────────────────────
  desktop-macos-arm64:
    name: Desktop (macOS dmg - Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject external profile
        shell: bash
        run: |
          P='${{ github.event.inputs.profile_json }}'
          [ -z "$P" ] && P='${{ secrets.PROFILE_JSON }}'
          if [ -n "$P" ]; then
            mkdir -p gradle/profiles
            echo "$P" > gradle/profiles/external.json
            echo "External profile injected"
          else
            echo "No external profile (using built-in)"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop package
        run: ./gradlew :desktop:packageReleaseDistributionForCurrentOS -Pprofile=${{ env.BUILD_PROFILE }} --quiet

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-desktop-macos-arm64
          path: desktop/build/compose/binaries/main-release/dmg/*.dmg
          retention-days: 7

  desktop-macos-x86_64:
    name: Desktop (macOS dmg - Intel)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject external profile
        shell: bash
        run: |
          P='${{ github.event.inputs.profile_json }}'
          [ -z "$P" ] && P='${{ secrets.PROFILE_JSON }}'
          if [ -n "$P" ]; then
            mkdir -p gradle/profiles
            echo "$P" > gradle/profiles/external.json
            echo "External profile injected"
          else
            echo "No external profile (using built-in)"
          fi

      - name: Set up JDK 17 (x86_64 via Rosetta)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          architecture: 'x64'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop package
        run: ./gradlew :desktop:packageReleaseDistributionForCurrentOS -Pprofile=${{ env.BUILD_PROFILE }} --quiet

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-desktop-macos-x86_64
          path: desktop/build/compose/binaries/main-release/dmg/*.dmg
          retention-days: 7

  # ── Android APK ────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject external profile
        shell: bash
        run: |
          P='${{ github.event.inputs.profile_json }}'
          [ -z "$P" ] && P='${{ secrets.PROFILE_JSON }}'
          if [ -n "$P" ]; then
            mkdir -p gradle/profiles
            echo "$P" > gradle/profiles/external.json
            echo "External profile injected"
          else
            echo "No external profile (using built-in)"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK
        run: |
          CAP='${{ env.BUILD_PROFILE }}'
          ./gradlew ":android:assemble${CAP^}Release" --quiet

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-android
          path: android/build/outputs/apk/${{ env.BUILD_PROFILE }}/release/*-release.apk
          retention-days: 7

  # ── Create GitHub Release ──────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [server, desktop-linux, desktop-windows, desktop-macos-arm64, desktop-macos-x86_64, android]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Gradle
        id: version
        run: |
          VERSION=$(grep 'packageVersion' build.gradle.kts | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: TeamTalk v${{ steps.version.outputs.version }}
          draft: true
          files: |
            artifacts/teamtalk-server/**
            artifacts/teamtalk-desktop-linux/*.deb
            artifacts/teamtalk-desktop-windows/*.msi
            artifacts/teamtalk-desktop-macos-arm64/*.dmg
            artifacts/teamtalk-desktop-macos-x86_64/*.dmg
            artifacts/teamtalk-android/*.apk

  # ── Deploy to server ───────────────────────────────
  deploy:
    name: Deploy to Server
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [server, desktop-linux, desktop-windows, desktop-macos-arm64, desktop-macos-x86_64, android]
    steps:
      - uses: actions/checkout@v4

      - name: Inject external profile
        shell: bash
        run: |
          P='${{ github.event.inputs.profile_json }}'
          [ -z "$P" ] && P='${{ secrets.PROFILE_JSON }}'
          if [ -n "$P" ]; then
            mkdir -p gradle/profiles
            echo "$P" > gradle/profiles/external.json
            echo "External profile injected"
          else
            echo "No external profile (using built-in)"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy server
        run: |
          echo "Profiles on disk:"
          ls -la gradle/profiles/
          cat gradle/profiles/external.json 2>/dev/null || echo "(no external profile)"
          PROFILE="${{ env.BUILD_PROFILE }}"
          CAP_PROFILE=$(echo "$PROFILE" | sed 's/\b\(.\)/\u\1/')
          echo "Deploying profile=$PROFILE cap=$CAP_PROFILE"
          ./gradlew "deployServer${CAP_PROFILE}"

      - name: Download client artifacts
        uses: actions/download-artifact@v4
        with:
          path: client-artifacts

      - name: Upload client artifacts to server
        run: |
          PROFILE="${{ env.BUILD_PROFILE }}"
          CAP_PROFILE=$(echo "$PROFILE" | sed 's/\b\(.\)/\u\1/')
          ./gradlew "upload${CAP_PROFILE}ClientArtifacts" -PARTIFACT_STAGING_DIR="$GITHUB_WORKSPACE/client-artifacts"
