name: Build & Release

on:
  workflow_dispatch:
    inputs:
      build_profile:
        description: 'Profile name (e.g. demo, production)'
        required: true
        default: 'demo'

env:
  BUILD_PROFILE: ${{ github.event.inputs.build_profile }}

jobs:
  # ── Server distribution ─────────────────────────────
  server:
    name: Server Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build server distribution
        run: ./gradlew :server:buildServerDist -PbuildProfile=$BUILD_PROFILE --quiet

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-server
          path: server/build/install/teamtalk-server/
          retention-days: 7

  # ── Desktop Linux (deb) ─────────────────────────────
  desktop-linux:
    name: Desktop (Linux deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop package
        run: ./gradlew :desktop:packageDistributionForCurrentOS -PbuildProfile=$BUILD_PROFILE --quiet

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-desktop-linux
          path: desktop/build/compose/binaries/main/deb/*.deb
          retention-days: 7

  # ── Desktop Windows (msi) ───────────────────────────
  desktop-windows:
    name: Desktop (Windows msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop package
        run: .\gradlew.bat :desktop:packageDistributionForCurrentOS -PbuildProfile=$env:BUILD_PROFILE --quiet

      - name: Upload msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-desktop-windows
          path: desktop/build/compose/binaries/main/msi/*.msi
          retention-days: 7

  # ── Desktop macOS (dmg) ────────────────────────────
  desktop-macos:
    name: Desktop (macOS dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop package
        run: ./gradlew :desktop:packageDistributionForCurrentOS -PbuildProfile=$BUILD_PROFILE --quiet

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-desktop-macos
          path: desktop/build/compose/binaries/main/dmg/*.dmg
          retention-days: 7

  # ── Android APK ────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK
        run: ./gradlew :android:assembleRelease -PbuildProfile=$BUILD_PROFILE --quiet

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-android
          path: android/build/outputs/apk/release/*-release.apk
          retention-days: 7

  # ── Create GitHub Release ──────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [server, desktop-linux, desktop-windows, desktop-macos, android]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Gradle
        id: version
        run: |
          VERSION=$(grep 'packageVersion' build.gradle.kts | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: TeamTalk v${{ steps.version.outputs.version }}
          draft: true
          files: |
            artifacts/teamtalk-server/**
            artifacts/teamtalk-desktop-linux/*.deb
            artifacts/teamtalk-desktop-windows/*.msi
            artifacts/teamtalk-desktop-macos/*.dmg
            artifacts/teamtalk-android/*.apk
