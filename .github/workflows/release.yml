name: Build & Release

on:
  workflow_dispatch:
    inputs:
      build_profile:
        description: 'Profile name (e.g. demo, production)'
        required: true
        default: 'demo'

env:
  BUILD_PROFILE: ${{ github.event.inputs.build_profile }}

jobs:
  # ── Server distribution ─────────────────────────────
  server:
    name: Server Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build server distribution
        run: ./gradlew :server:buildServerDist -PbuildProfile=${{ env.BUILD_PROFILE }} --quiet

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-server
          path: server/build/install/teamtalk-server/
          retention-days: 7

  # ── Desktop Linux (deb) ─────────────────────────────
  desktop-linux:
    name: Desktop (Linux deb)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop package
        run: ./gradlew :desktop:packageDistributionForCurrentOS -PbuildProfile=${{ env.BUILD_PROFILE }} --quiet

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-desktop-linux
          path: desktop/build/compose/binaries/main/deb/*.deb
          retention-days: 7

  # ── Desktop Windows (msi) ───────────────────────────
  desktop-windows:
    name: Desktop (Windows msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop package
        run: .\gradlew.bat :desktop:packageDistributionForCurrentOS -PbuildProfile=${{ env.BUILD_PROFILE }} --quiet

      - name: Upload msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-desktop-windows
          path: desktop/build/compose/binaries/main/msi/*.msi
          retention-days: 7

  # ── Desktop macOS (dmg) ────────────────────────────
  desktop-macos:
    name: Desktop (macOS dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop package
        run: ./gradlew :desktop:packageDistributionForCurrentOS -PbuildProfile=${{ env.BUILD_PROFILE }} --quiet

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-desktop-macos
          path: desktop/build/compose/binaries/main/dmg/*.dmg
          retention-days: 7

  # ── Android APK ────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK
        run: ./gradlew :android:assembleRelease -PbuildProfile=${{ env.BUILD_PROFILE }} --quiet

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamtalk-android
          path: android/build/outputs/apk/release/*-release.apk
          retention-days: 7

  # ── Create GitHub Release ──────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [server, desktop-linux, desktop-windows, desktop-macos, android]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Gradle
        id: version
        run: |
          VERSION=$(grep 'packageVersion' build.gradle.kts | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: TeamTalk v${{ steps.version.outputs.version }}
          draft: true
          files: |
            artifacts/teamtalk-server/**
            artifacts/teamtalk-desktop-linux/*.deb
            artifacts/teamtalk-desktop-windows/*.msi
            artifacts/teamtalk-desktop-macos/*.dmg
            artifacts/teamtalk-android/*.apk

  # ── Deploy to server ───────────────────────────────
  deploy:
    name: Deploy to Server
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [server, desktop-linux, desktop-windows, desktop-macos, android]
    steps:
      - uses: actions/checkout@v4

      - name: Extract deploy config from profile
        id: profile
        run: |
          PROFILE_FILE="gradle/profiles/${{ env.BUILD_PROFILE }}.properties"
          if [ ! -f "$PROFILE_FILE" ]; then
            echo "::error::Profile file not found: $PROFILE_FILE"
            exit 1
          fi
          DEPLOY_HOST=$(grep '^deploy.host=' "$PROFILE_FILE" | cut -d'=' -f2-)
          DEPLOY_USER=$(grep '^deploy.user=' "$PROFILE_FILE" | cut -d'=' -f2-)
          DEPLOY_PATH=$(grep '^deploy.path=' "$PROFILE_FILE" | cut -d'=' -f2-)
          SERVER_URL=$(grep '^serverUrl=' "$PROFILE_FILE" | cut -d'=' -f2-)
          echo "host=${DEPLOY_HOST:-$(echo $SERVER_URL | sed 's|.*://||' | sed 's|/.*||' | sed 's|:.*||')}" >> $GITHUB_OUTPUT
          echo "user=${DEPLOY_USER:-root}" >> $GITHUB_OUTPUT
          echo "path=${DEPLOY_PATH:-/opt/teamtalk}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ steps.profile.outputs.host }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rename and upload client files
        run: |
          mkdir -p upload
          # Rename files to stable names
          cp artifacts/teamtalk-desktop-linux/*.deb        upload/TeamTalk-linux.deb
          cp artifacts/teamtalk-desktop-windows/*.msi      upload/TeamTalk-windows.msi
          cp artifacts/teamtalk-desktop-macos/*.dmg        upload/TeamTalk-macos.dmg
          cp artifacts/teamtalk-android/*.apk              upload/TeamTalk-android.apk
          ls -lh upload/

          # Upload to server
          scp -i ~/.ssh/deploy_key upload/* ${{ steps.profile.outputs.user }}@${{ steps.profile.outputs.host }}:${{ steps.profile.outputs.path }}/static/downloads/

      - name: Health check
        run: |
          sleep 3
          curl -sf -o /dev/null ${{ steps.profile.outputs.host }} && echo "Site OK" || echo "Site check failed (non-fatal)"
