name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Compile shared + server
        run: ./gradlew :shared:compileKotlinJvm :server:compileKotlin

      - name: Compile desktop
        run: ./gradlew :app:compileKotlinDesktop :desktop:compileKotlinDesktop

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Run server tests
        run: ./gradlew :server:test

      - name: Run shared protocol tests (ProtoRoundTripTest)
        run: ./gradlew :shared:jvmTest

      - name: Run client tests
        run: ./gradlew :app:desktopTest
